name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      frontend-bucket: ${{ steps.cdk-outputs.outputs.frontend-bucket }}
      distribution-id: ${{ steps.cdk-outputs.outputs.distribution-id }}
      ecr-repo: ${{ steps.cdk-outputs.outputs.ecr-repo }}
      lambda-function: ${{ steps.cdk-outputs.outputs.lambda-function }}
      user-pool-id: ${{ steps.cdk-outputs.outputs.user-pool-id }}
      user-pool-client-id: ${{ steps.cdk-outputs.outputs.user-pool-client-id }}
      api-url: ${{ steps.cdk-outputs.outputs.api-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/cdk/package-lock.json

      - name: Install CDK dependencies
        run: npm ci
        working-directory: infrastructure/cdk

      - name: CDK diff
        run: npx cdk diff --all 2>&1 || true
        working-directory: infrastructure/cdk
        env:
          CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
          CDK_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_REGION: ${{ env.AWS_REGION }}
          CDK_BUDGET_EMAIL: ${{ vars.CDK_BUDGET_EMAIL }}

      - name: CDK deploy
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
        working-directory: infrastructure/cdk
        env:
          CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
          CDK_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_REGION: ${{ env.AWS_REGION }}
          CDK_BUDGET_EMAIL: ${{ vars.CDK_BUDGET_EMAIL }}

      - name: Extract CDK outputs
        id: cdk-outputs
        working-directory: infrastructure/cdk
        run: |
          echo "frontend-bucket=$(jq -r '.MySiteApp.FrontendBucketName' cdk-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "distribution-id=$(jq -r '.MySiteApp.DistributionId' cdk-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "ecr-repo=$(jq -r '.MySiteData.EcrRepoUri' cdk-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "lambda-function=$(jq -r '.MySiteApp.LambdaFunctionName' cdk-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "user-pool-id=$(jq -r '.MySiteData.UserPoolId' cdk-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "user-pool-client-id=$(jq -r '.MySiteData.UserPoolClientId' cdk-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "api-url=$(jq -r '.MySiteApp.ApiUrl' cdk-outputs.json)" >> "$GITHUB_OUTPUT"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Lambda image
        run: |
          IMAGE_URI="${{ needs.deploy-infra.outputs.ecr-repo }}:${{ github.event.workflow_run.head_sha }}"
          docker build \
            --platform linux/arm64 \
            -f docker/backend/Dockerfile.lambda \
            -t "$IMAGE_URI" \
            .
          docker push "$IMAGE_URI"

      - name: Update Lambda function
        run: |
          IMAGE_URI="${{ needs.deploy-infra.outputs.ecr-repo }}:${{ github.event.workflow_run.head_sha }}"
          aws lambda update-function-code \
            --function-name "${{ needs.deploy-infra.outputs.lambda-function }}" \
            --image-uri "$IMAGE_URI" \
            --no-cli-pager

          echo "Waiting for Lambda update to complete..."
          aws lambda wait function-updated \
            --function-name "${{ needs.deploy-infra.outputs.lambda-function }}"

      - name: Health check
        run: |
          API_URL="${{ needs.deploy-infra.outputs.api-url }}"
          for i in 1 2 3 4 5; do
            if curl --fail --silent "${API_URL}/api/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-infra.outputs.api-url }}
          VITE_COGNITO_USER_POOL_ID: ${{ needs.deploy-infra.outputs.user-pool-id }}
          VITE_COGNITO_APP_CLIENT_ID: ${{ needs.deploy-infra.outputs.user-pool-client-id }}
          VITE_COGNITO_REGION: ${{ env.AWS_REGION }}
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ "s3://${{ needs.deploy-infra.outputs.frontend-bucket }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "manifest.webmanifest"

          aws s3 cp frontend/dist/index.html "s3://${{ needs.deploy-infra.outputs.frontend-bucket }}/index.html" \
            --cache-control "public,max-age=0,must-revalidate"

          aws s3 cp frontend/dist/sw.js "s3://${{ needs.deploy-infra.outputs.frontend-bucket }}/sw.js" \
            --cache-control "public,max-age=0,must-revalidate" 2>/dev/null || true

          aws s3 cp frontend/dist/manifest.webmanifest "s3://${{ needs.deploy-infra.outputs.frontend-bucket }}/manifest.webmanifest" \
            --cache-control "public,max-age=0,must-revalidate" 2>/dev/null || true

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.deploy-infra.outputs.distribution-id }}" \
            --paths "/index.html" "/sw.js" "/manifest.webmanifest"
